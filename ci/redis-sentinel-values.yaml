# Overlay for agent/server subcharts: external Redis via Sentinel (helm template checks).
# Used by scripts/verify-redis-sentinel-template.sh
global:
  nativeRedis:
    enabled: false
  externalRedis:
    enabled: true
    host: redis
    port: "26379"
    scheme: redis-sentinel
    sentinelMasterName: mymaster
    sentinelPassword: convoy
    password: convoy
